<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acolhida - Dinâmica</title>
    <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Baloo 2', cursive;
            /* Fundo que imita linhas de caderno */
            background-color: #fff;
            background-image: 
                linear-gradient(#f4f7f6 1.2em, transparent 1.2em),
                linear-gradient(90deg, #f4f7f6 1.2em, transparent 1.2em),
                linear-gradient(#e0e0e0 1px, transparent 1px);
            background-size: 100% 2em, 2em 100%, 100% 2em;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .container {
            background: rgba(255, 255, 255, 0.95);
            padding: 30px;
            border-radius: 20px;
            border: 3px dashed #87CEEB; /* Borda tracejada azul bebê */
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        .logos {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 20px;
        }
        .logos img {
            max-height: 50px; /* Ajuste o tamanho da logo aqui se precisar */
            width: auto;
            object-fit: contain;
        }
        h2 {
            color: #2c3e50;
            font-size: 1.4rem;
            margin-bottom: 25px;
            line-height: 1.3;
            font-weight: 800;
        }
        input[type="text"] {
            width: 100%;
            padding: 15px;
            border: 2px solid #ffb6c1; /* Rosa pastel */
            border-radius: 15px;
            font-family: 'Baloo 2', cursive;
            font-size: 1.1rem;
            margin-bottom: 20px;
            box-sizing: border-box;
            transition: border-color 0.3s, transform 0.2s;
        }
        input[type="text"]:focus {
            border-color: #ff69b4;
            outline: none;
            transform: scale(1.02);
        }
        button {
            width: 100%;
            padding: 15px;
            background-color: #FFD700; /* Amarelo escolar */
            color: #333;
            border: none;
            border-radius: 15px;
            font-family: 'Baloo 2', cursive;
            font-size: 1.3rem;
            font-weight: 800;
            cursor: pointer;
            box-shadow: 0 4px 0 #daa520; /* Efeito 3D no botão */
            transition: all 0.2s;
        }
        button:active {
            transform: translateY(4px);
            box-shadow: 0 0 0 #daa520;
        }
        button:disabled {
            background-color: #e0e0e0;
            box-shadow: 0 4px 0 #bdbdbd;
            cursor: not-allowed;
            color: #888;
        }
        #mensagem {
            margin-top: 20px;
            font-size: 1.2rem;
            font-weight: 800;
            color: #32cd32;
            display: none;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="logos">
            <img src="logo-prefeitura.png" alt="Prefeitura">
            <img src="logo-secretaria.png" alt="Secretaria">
        </div>

        <h2>Qual palavra define o maior desafio da gestão pedagógica hoje?</h2>
        <input type="text" id="palavraInput" placeholder="Digite sua palavra aqui..." autocomplete="off" required>
        <button id="btnEnviar">Enviar Palavra!</button>
        <div id="mensagem">Palavra enviada! Olhe para a lousa! ✨</div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-app.js";
        import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBJIWRKKic5B-VhtEZhD2fLdkLCQAyDaes",
            authDomain: "nuvempedagogica-fb98f.firebaseapp.com",
            projectId: "nuvempedagogica-fb98f",
            storageBucket: "nuvempedagogica-fb98f.firebasestorage.app",
            messagingSenderId: "470318049801",
            appId: "1:470318049801:web:7b7db32f0360352454e6d8",
            measurementId: "G-5VR3GYLR84"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const input = document.getElementById('palavraInput');
        const btn = document.getElementById('btnEnviar');
        const mensagem = document.getElementById('mensagem');

        btn.addEventListener('click', async () => {
            const palavra = input.value.trim().toUpperCase();
            
            if (palavra === "") {
                alert("Por favor, digite uma palavra.");
                return;
            }

            btn.disabled = true;
            btn.innerText = "Enviando...";

            try {
                await addDoc(collection(db, "palavras"), {
                    texto: palavra,
                    timestamp: serverTimestamp()
                });
                
                input.value = "";
                input.style.display = "none";
                btn.style.display = "none";
                mensagem.style.display = "block";
            } catch (error) {
                console.error("Erro ao adicionar documento: ", error);
                alert("Erro ao enviar. Tente novamente.");
                btn.disabled = false;
                btn.innerText = "Enviar Palavra!";
            }
        });
    </script>
</body>
</html>
