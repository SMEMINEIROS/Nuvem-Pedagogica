<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Participar da Dinâmica</title>
    <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Baloo 2', cursive; background-color: #fff; background-image: linear-gradient(#f4f7f6 1.2em, transparent 1.2em), linear-gradient(90deg, #f4f7f6 1.2em, transparent 1.2em), linear-gradient(#e0e0e0 1px, transparent 1px); background-size: 100% 2em, 2em 100%, 100% 2em; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; padding: 20px; box-sizing: border-box; }
        .container { background: rgba(255, 255, 255, 0.95); padding: 30px; border-radius: 20px; border: 3px dashed #87CEEB; box-shadow: 0 8px 20px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }
        .logos { display: flex; justify-content: center; gap: 15px; margin-bottom: 20px; }
        .logos img { max-height: 50px; width: auto; object-fit: contain; }
        h2 { color: #2c3e50; font-size: 1.4rem; margin-bottom: 25px; line-height: 1.3; font-weight: 800; }
        input[type="text"] { width: 100%; padding: 15px; border: 2px solid #ffb6c1; border-radius: 15px; font-family: 'Baloo 2', cursive; font-size: 1.1rem; margin-bottom: 20px; box-sizing: border-box; text-align: center; font-weight: bold; text-transform: uppercase;}
        input[type="text"]:focus { border-color: #ff69b4; outline: none; }
        button { width: 100%; padding: 15px; background-color: #FFD700; color: #333; border: none; border-radius: 15px; font-family: 'Baloo 2', cursive; font-size: 1.3rem; font-weight: 800; cursor: pointer; box-shadow: 0 4px 0 #daa520; transition: all 0.2s; }
        button:active { transform: translateY(4px); box-shadow: 0 0 0 #daa520; }
        button:disabled { background-color: #e0e0e0; box-shadow: 0 4px 0 #bdbdbd; cursor: not-allowed; }
        #mensagem { margin-top: 20px; font-size: 1.2rem; font-weight: 800; color: #32cd32; display: none; }
    </style>
</head>
<body>

    <div class="container">
        <div class="logos">
            <img src="logo-prefeitura.png" alt="Prefeitura">
            <img src="logo-secretaria.png" alt="Secretaria">
        </div>

        <h2 id="textoPergunta">Carregando pergunta...</h2>
        
        <div id="areaForm" style="display: none;">
            <input type="text" id="palavraInput" placeholder="UMA ÚNICA PALAVRA" autocomplete="off" maxlength="20" required>
            <button id="btnEnviar">Enviar Palavra!</button>
        </div>
        <div id="mensagem">Enviado! Olhe para a lousa! ✨</div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-app.js";
        import { getFirestore, collection, addDoc, serverTimestamp, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBJIWRKKic5B-VhtEZhD2fLdkLCQAyDaes",
            authDomain: "nuvempedagogica-fb98f.firebaseapp.com",
            projectId: "nuvempedagogica-fb98f",
            storageBucket: "nuvempedagogica-fb98f.firebasestorage.app",
            messagingSenderId: "470318049801",
            appId: "1:470318049801:web:7b7db32f0360352454e6d8"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let sessaoAtual = "";

        // Escuta as configurações em tempo real
        onSnapshot(doc(db, "config", "geral"), (doc) => {
            if (doc.exists()) {
                const data = doc.data();
                document.getElementById('textoPergunta').innerText = data.pergunta;
                document.getElementById('areaForm').style.display = "block";
                
                // Se o gestor resetou a sessão, reativa o botão para a pessoa poder enviar de novo
                if(sessaoAtual !== "" && sessaoAtual !== data.sessao) {
                    document.getElementById('mensagem').style.display = "none";
                    document.getElementById('areaForm').style.display = "block";
                    document.getElementById('palavraInput').value = "";
                    const btn = document.getElementById('btnEnviar');
                    btn.disabled = false;
                    btn.innerText = "Enviar Palavra!";
                }
                sessaoAtual = data.sessao;
            }
        });

        const input = document.getElementById('palavraInput');
        const btn = document.getElementById('btnEnviar');

        // Impede espaços (para forçar apenas 1 palavra na nuvem)
        input.addEventListener('keydown', function(e) { if (e.key === ' ') e.preventDefault(); });

        btn.addEventListener('click', async () => {
            const palavra = input.value.trim().toUpperCase();
            if (palavra === "") return;

            btn.disabled = true;
            btn.innerText = "Enviando...";

            try {
                await addDoc(collection(db, "palavras"), {
                    texto: palavra,
                    sessao: sessaoAtual, // Vincula a palavra à sessão atual
                    timestamp: serverTimestamp()
                });
                
                document.getElementById('areaForm').style.display = "none";
                document.getElementById('mensagem').style.display = "block";
            } catch (error) {
                alert("Erro. Tente novamente.");
                btn.disabled = false;
                btn.innerText = "Enviar Palavra!";
            }
        });
    </script>
</body>
</html>
