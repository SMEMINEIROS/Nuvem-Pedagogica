<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mural - Nuvem de Palavras</title>
    <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;800&family=Caveat:wght@700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/wordcloud2.js/1.2.2/wordcloud2.min.js"></script>
    <style>
        body { margin: 0; padding: 0; background-color: #2b503f; background-image: radial-gradient(circle, #33614c 10%, transparent 10%), radial-gradient(circle, #33614c 10%, transparent 10%); background-size: 20px 20px; background-position: 0 0, 10px 10px; font-family: 'Baloo 2', cursive; overflow: hidden; display: flex; flex-direction: column; height: 100vh; }
        header { display: flex; justify-content: space-between; align-items: center; background: #ffffff; padding: 15px 40px; box-shadow: 0 4px 15px rgba(0,0,0,0.4); border-bottom: 6px solid #FFD700; z-index: 10; }
        .logo-header { max-height: 70px; width: auto; }
        .header-text { text-align: center; flex-grow: 1; padding: 0 20px; }
        h1 { margin: 0; font-size: 2.5rem; color: #2c3e50; font-weight: 800; }
        p.subtitulo { margin: 5px 0 0 0; font-size: 1.4rem; color: #e74c3c; font-weight: 600; }
        #canvas-container { flex-grow: 1; width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; position: relative; padding: 20px; box-sizing: border-box; }
        canvas { width: 100%; height: 100%; }
        #msgVazio { position: absolute; color: rgba(255,255,255,0.3); font-family: 'Caveat', cursive; font-size: 3rem; text-align: center; pointer-events: none; }
    </style>
</head>
<body>

    <header>
        <img src="logo-prefeitura.png" alt="Prefeitura" class="logo-header">
        <div class="header-text">
            <h1 id="tituloTelao">Carregando...</h1>
            <p class="subtitulo" id="perguntaTelao">Aguarde...</p>
        </div>
        <img src="logo-secretaria.png" alt="Secretaria" class="logo-header">
    </header>

    <div id="canvas-container">
        <div id="msgVazio">A lousa está limpa. Envie a primeira palavra!</div>
        <canvas id="nuvemCanvas"></canvas>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-app.js";
        import { getFirestore, collection, onSnapshot, query, where, doc } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBJIWRKKic5B-VhtEZhD2fLdkLCQAyDaes",
            authDomain: "nuvempedagogica-fb98f.firebaseapp.com",
            projectId: "nuvempedagogica-fb98f",
            storageBucket: "nuvempedagogica-fb98f.firebasestorage.app",
            messagingSenderId: "470318049801",
            appId: "1:470318049801:web:7b7db32f0360352454e6d8"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let sessaoAtual = "";
        let listenerPalavras = null;
        const canvas = document.getElementById('nuvemCanvas');
        const container = document.getElementById('canvas-container');
        const msgVazio = document.getElementById('msgVazio');

        onSnapshot(doc(db, "config", "geral"), (docSnap) => {
            if (docSnap.exists()) {
                const data = docSnap.data();
                document.getElementById('tituloTelao').innerText = data.titulo_telao;
                document.getElementById('perguntaTelao').innerText = data.pergunta;

                if (sessaoAtual !== data.sessao) {
                    sessaoAtual = data.sessao;
                    iniciarEscutaPalavras(); 
                }
            }
        });

        function iniciarEscutaPalavras() {
            if (listenerPalavras) listenerPalavras(); 

            const q = query(collection(db, "palavras"), where("sessao", "==", sessaoAtual));
            
            listenerPalavras = onSnapshot(q, (snapshot) => {
                const contagem = {};
                
                snapshot.forEach((doc) => {
                    const palavra = doc.data().texto;
                    contagem[palavra] = (contagem[palavra] || 0) + 1;
                });

                // Descobre qual é a palavra mais repetida para usar como limite (Escala Relativa)
                const maxRepeticoes = Math.max(...Object.values(contagem), 1);

                const listaNuvem = Object.keys(contagem).map(palavra => {
                    // Peso máximo base é 100. As outras palavras crescem em proporção à maior.
                    let peso = (contagem[palavra] / maxRepeticoes) * 100;
                    
                    // Garante que as palavras únicas (peso baixo) não fiquem microscópicas
                    if (peso < 25) peso = 25; 

                    return [palavra, peso]; 
                });

                desenharNuvem(listaNuvem);
            });
        }

        function desenharNuvem(lista) {
            canvas.width = container.clientWidth;
            canvas.height = container.clientHeight;

            if (lista.length === 0) {
                msgVazio.style.display = "block";
                const ctx = canvas.getContext('2d');
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                return;
            }

            msgVazio.style.display = "none";

            WordCloud(canvas, {
                list: lista,
                fontFamily: 'Caveat, cursive', 
                fontWeight: 'bold',
                color: 'random-light', 
                backgroundColor: 'transparent',
                rotateRatio: 0.1, // Reduzi um pouco a rotação para caberem mais palavras
                minSize: 10,
                
                // AS DUAS CONFIGURAÇÕES QUE CORRIGEM O BUG:
                shrinkToFit: true, // Obriga a encolher a palavra se ela for vazar
                drawOutOfBound: false, // Proíbe desenhar fora do quadro
                
                weightFactor: function (size) {
                    // Um multiplicador mais seguro que se ajusta a qualquer tela sem exagerar
                    return size * (container.clientWidth / 1200); 
                }
            });
        }

        window.addEventListener('resize', () => {
            if (sessaoAtual) iniciarEscutaPalavras();
        });
    </script>
</body>
</html>
